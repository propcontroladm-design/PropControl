<!DOCTYPE html>
<html lang="es">
<head>

<title>PropControl</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#16a34a;--green-bg:#dcfce7;--green-text:#14532d;
  --red:#dc2626;--red-bg:#fee2e2;--red-text:#7f1d1d;
  --yellow:#d97706;--yellow-bg:#fef3c7;--yellow-text:#78350f;
  --blue:#2563eb;--blue-bg:#dbeafe;--blue-text:#1e3a8a;
  --gray:#6b7280;--gray-bg:#f3f4f6;--gray-text:#111827;
  --border:#e5e7eb;--surface:#fff;--page:#f9fafb;
  --text:#111827;--text2:#6b7280;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--page);color:var(--text);min-height:100vh;font-size:15px}
#root{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
button{cursor:pointer;border:none;font-family:inherit;font-size:15px}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--text)}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;padding:0 8px;gap:4px}
.nav-title{flex:1;text-align:center;font-weight:700;font-size:17px;letter-spacing:-.3px;padding:14px 0}
.nav-user{width:32px;height:32px;border-radius:50%;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:none;flex-shrink:0;cursor:pointer}
.nav-btn{background:none;color:var(--blue);padding:10px 6px;font-size:13px;font-weight:600;white-space:nowrap}

/* SYNC */
.sync-bar{background:#fff;border-bottom:1px solid var(--border);padding:5px 14px;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:var(--green)}.sync-dot.off{background:var(--gray)}.sync-dot.loading{background:var(--blue);animation:pulse 1s infinite}.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:50px;padding:10px 2px 8px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;background:none;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-icon{display:block;font-size:16px;margin-bottom:2px}

.content{flex:1;padding:16px}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-row:last-child{margin-bottom:0}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-paid{background:var(--green-bg);color:var(--green-text)}
.badge-pending{background:var(--red-bg);color:var(--red-text)}
.badge-partial{background:var(--yellow-bg);color:var(--yellow-text)}
.badge-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-paid{background:var(--green)}.dot-pending{background:var(--red)}.dot-partial{background:var(--yellow)}

/* PROPERTY DASHBOARD CARD */
.prop-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.prop-id{font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-bg);padding:2px 7px;border-radius:5px;display:inline-block;margin-bottom:4px}
.prop-name{font-size:16px;font-weight:700;margin-bottom:1px}
.prop-sub{font-size:12px;color:var(--text2);margin-bottom:10px}
.prop-amounts{display:flex;gap:7px;margin-bottom:10px}
.amount-box{flex:1;background:var(--gray-bg);border-radius:9px;padding:8px;text-align:center}
.amount-label{font-size:10px;color:var(--text2);margin-bottom:1px}
.amount-val{font-size:14px;font-weight:700}
.amount-val.green{color:var(--green)}.amount-val.red{color:var(--red)}.amount-val.yellow{color:var(--yellow)}
.prop-actions{display:flex;gap:6px}
.btn-pay{flex:1;background:var(--blue);color:#fff;padding:10px;border-radius:9px;font-weight:600;font-size:14px}
.btn-wa{background:#25d366;color:#fff;padding:10px 12px;border-radius:9px;font-size:15px;border:none;cursor:pointer}
.btn-sm{background:var(--gray-bg);color:var(--gray-text);padding:10px 11px;border-radius:9px;font-size:13px}

/* FORMS */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:#fff;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--blue)}
.form-select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:#fff;outline:none;appearance:none}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.form-hint{font-size:12px;color:var(--text2);margin-top:4px}
.form-check{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px}
.form-check input{width:18px;height:18px;cursor:pointer;accent-color:var(--blue)}

/* CURRENCY */
.currency-wrap{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.currency-select{border:none;background:var(--gray-bg);padding:11px 10px;font-size:14px;font-weight:600;outline:none;border-right:1px solid var(--border);min-width:80px;color:var(--text)}
.currency-input{flex:1;border:none;padding:11px 13px;font-size:15px;outline:none;background:#fff;min-width:0}

/* PAYMENT METHOD */
.pay-method-row{display:flex;gap:8px;margin-bottom:12px}
.pay-method-btn{flex:1;padding:10px 6px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--text2);text-align:center;cursor:pointer;transition:all .15s}
.pay-method-btn.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}

.section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 10px}
.tramo-card{background:var(--gray-bg);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.tramo-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}

/* BUTTONS */
.btn-primary{width:100%;background:var(--blue);color:#fff;padding:13px;border-radius:12px;font-size:16px;font-weight:700;margin-top:8px}
.btn-secondary{background:none;border:1.5px solid var(--border);color:var(--text);padding:11px;border-radius:10px;font-size:14px;font-weight:600;width:100%}
.btn-add{background:var(--blue-bg);color:var(--blue);padding:9px 13px;border-radius:10px;font-size:14px;font-weight:600;width:100%;margin-top:6px}
.btn-danger{background:var(--red-bg);color:var(--red-text);padding:11px;border-radius:10px;font-size:14px;font-weight:600;width:100%;margin-top:8px}
.btn-google{width:100%;background:#fff;border:1.5px solid var(--border);color:var(--text);padding:12px;border-radius:12px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:93vh;overflow-y:auto;padding:18px 16px 44px}
.modal-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}

/* STATS */
.stats-row{display:flex;gap:8px;margin-bottom:14px}
.stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px;text-align:center}
.stat-num{font-size:20px;font-weight:800;margin-bottom:1px}
.stat-label{font-size:10px;color:var(--text2)}

/* VARIABLES */
.var-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:10px}
.var-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.var-row:last-child{margin-bottom:0}
.var-label{font-size:13px;color:var(--text2);flex:1}
.var-input{width:120px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;text-align:right;background:#fff}

/* MONTH ROW */
.month-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.month-row:last-child{border-bottom:none}

/* MISC */
.empty{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-msg{font-size:15px;font-weight:500;margin-bottom:5px;color:var(--text)}
.empty-sub{font-size:13px}

.alert{padding:11px 13px;border-radius:10px;font-size:13px;margin-bottom:12px;line-height:1.5}
.alert-info{background:var(--blue-bg);color:var(--blue-text)}
.alert-success{background:var(--green-bg);color:var(--green-text)}
.alert-warn{background:var(--yellow-bg);color:var(--yellow-text)}

.chip{display:inline-block;background:var(--gray-bg);color:var(--text2);padding:3px 9px;border-radius:20px;font-size:12px;margin-right:4px;margin-bottom:3px}
.fab{position:fixed;bottom:22px;right:18px;width:54px;height:54px;background:var(--blue);color:#fff;border-radius:27px;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(37,99,235,.4);z-index:150;border:none;cursor:pointer}
.divider{height:1px;background:var(--border);margin:14px 0}

.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px;margin-right:3px;margin-bottom:2px}
.tag-local{background:#fef3c7;color:#78350f}
.tag-depto{background:#e0f2fe;color:#0c4a6e}
.tag-terreno{background:#dcfce7;color:#14532d}
.tag-otro{background:#f3e8ff;color:#581c87}
.tag-fijo{background:#e0f2fe;color:#0c4a6e}
.tag-escalonado{background:#f3e8ff;color:#581c87}
.tag-pesos{background:#dcfce7;color:#166534}
.tag-dolar{background:#fef3c7;color:#78350f}
.tag-nafta{background:#fce7f3;color:#831843}

/* PROPERTY LIST CARD */
.proplist-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px;box-shadow:var(--shadow)}
.proplist-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.proplist-id{font-size:11px;font-weight:700;color:var(--blue)}
.proplist-name{font-size:15px;font-weight:700;margin-bottom:2px}
.proplist-addr{font-size:12px;color:var(--text2)}
.proplist-actions{display:flex;gap:6px;margin-top:8px}

/* INQUILINO CARD */
.inq-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.inq-avatar{width:38px;height:38px;border-radius:19px;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.inq-info{flex:1;margin-left:11px}
.inq-name{font-size:15px;font-weight:700}
.inq-detail{font-size:12px;color:var(--text2);margin-top:1px}
.inq-actions{display:flex;gap:6px}

/* GASTO */
.gasto-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:8px}
.gasto-row{display:flex;justify-content:space-between;align-items:flex-start}
.gasto-info{flex:1}
.gasto-tipo{font-size:14px;font-weight:700}
.gasto-desc{font-size:12px;color:var(--text2);margin-top:2px}
.gasto-monto-box{text-align:right}
.gasto-monto{font-size:15px;font-weight:700}
.gasto-quien{font-size:11px;color:var(--text2);margin-top:2px}

/* SETUP */
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.setup-step{display:flex;gap:11px;margin-bottom:12px;align-items:flex-start}
.setup-num{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.setup-text{font-size:13px;line-height:1.5;flex:1}
.code-block{background:var(--gray-bg);border-radius:7px;padding:9px 11px;font-family:monospace;font-size:12px;word-break:break-all;margin-top:5px}

/* PAGO DETALLE */
.pago-detail{background:var(--gray-bg);border-radius:9px;padding:10px;margin-top:8px;font-size:13px}
.pago-detail-row{display:flex;justify-content:space-between;margin-bottom:4px}
.pago-detail-row:last-child{margin-bottom:0}

/* SEARCH */
.search-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:#fff;outline:none;margin-bottom:12px}
.search-input:focus{border-color:var(--blue)}

/* v4 NEW STYLES */
.pago-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.pago-item-left{flex:1}
.pago-item-monto{font-size:14px;font-weight:700}
.pago-item-meta{font-size:12px;color:var(--text2);margin-top:2px}
.pago-item-del{background:none;border:none;color:var(--red);font-size:20px;padding:4px 8px;cursor:pointer;line-height:1}
.grupo-badge{display:inline-flex;align-items:center;gap:4px;background:#ede9fe;color:#4c1d95;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;margin-right:4px}
.tab-sub{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.tab-sub::-webkit-scrollbar{display:none}
.tab-sub-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.tab-sub-btn.active{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.idx-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:10px}
.idx-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.idx-name{font-size:15px;font-weight:700}
.owner-chip{display:inline-flex;align-items:center;gap:4px;background:#ede9fe;color:#4c1d95;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;margin-right:4px;margin-bottom:4px}
.roi-bar{height:6px;border-radius:3px;background:var(--gray-bg);margin-top:6px;overflow:hidden}
.roi-fill{height:100%;border-radius:3px;background:var(--green)}
.roi-fill.neg{background:var(--red)}
.expensa-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px;margin-bottom:9px}
.expensa-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.expensa-title{font-size:14px;font-weight:700}
.expensa-rows{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.expensa-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--gray-bg);border-radius:8px;font-size:13px}
</style>
</head>

// ═══ MIGRATE PAGOS: object → array ═══════════
function migrarPagos(pagos){
  const m={};
  Object.entries(pagos||{}).forEach(([k,v])=>{m[k]=Array.isArray(v)?v:[{...v,id:uid()}]});
  return m;
}

// ═══ ESTADO PAGO (pagos múltiples) ═══════════
function estadoPagoV4(alqId,mk,pagos,esperadoPesos){
  const lista=pagos[`${alqId}_${mk}`]||[];
  const esp=esperadoPesos||0;
  const total=lista.reduce((s,p)=>s+(p.montoPesos||p.monto||0),0);
  const diff=total-esp;
  return{estado:diff>=-0.5?'pagado':(total>0?'parcial':'pendiente'),pagado:total,esperado:esp,diferencia:diff,lista};
}

// ═══ CALCULAR MONTO V4 (frecuencia + custom idx) ═
function calcularMontoV4(alquiler,year,month,variables,indices){
  if(!alquiler?.contrato)return null;
  const c=alquiler.contrato;
  const mk=mesKey(year,month);
  const vm=variables[mk]||{};
  const inicio=new Date((alquiler.fechaInicio||'2025-01-01')+'T00:00:00');
  const mesRel=(year-inicio.getFullYear())*12+(month-inicio.getMonth())+1;

  const calcTramoV4=(base,moneda,ajuste,indiceId,frecuencia)=>{
    let monto=parseFloat(base)||0;
    const freq=frecuencia||'mensual';
    const aplica=freq==='mensual'||(freq==='trimestral'&&(mesRel-1)%3===0)||(freq==='semestral'&&(mesRel-1)%6===0)||(freq==='anual'&&(mesRel-1)%12===0);
    if(aplica){
      if(ajuste==='ipc'&&vm.ipc)monto=monto*(1+vm.ipc/100);
      else if(ajuste==='custom'&&indiceId&&indices){
        const idx=(indices||[]).find(i=>i.id===indiceId);
        const val=idx?.valores?.[mk];
        if(val)monto=monto*(1+val/100);
      }
    }
    const ivaF=c.iva?1.21:1;
    return{monto:monto*ivaF,moneda:moneda||'pesos',iva:!!c.iva};
  };

  if(c.tipo==='fijo')return calcTramoV4(c.montoBase,c.moneda,c.ajuste,c.indiceId,c.frecuenciaAjuste);
  if(c.tipo==='escalonado'){
    const t=(c.tramos||[]).find(t=>mesRel>=t.mesDesde&&mesRel<=t.mesHasta);
    if(!t)return null;
    return calcTramoV4(t.montoBase,t.moneda||c.moneda,t.ajuste,t.indiceId,t.frecuenciaAjuste);
  }
  return null;
}

const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const NOW=new Date();
const uid=()=>Math.random().toString(36).slice(2,9);
const mesKey=(y,m)=>`${y}-${String(m+1).padStart(2,'0')}`;
const mesLabel=(y,m)=>MESES[m]+' '+y;

function fmtNum(n,moneda){
  if(n==null||isNaN(n))return '—';
  const r=Math.round(n).toLocaleString('es-AR');
  if(moneda==='dolar')return 'U$D '+r;
  if(moneda==='nafta')return r+' L';
  return '$'+r;
}

function generarMeses(fechaInicio){
  const inicio=new Date((fechaInicio||'2025-05-01')+'T00:00:00');
  const meses=[];
  const start=new Date(NOW.getFullYear(),4,1);
  const end=new Date(NOW.getFullYear()+1,NOW.getMonth()+2,1);
  let cur=new Date(Math.max(inicio.getTime(),start.getTime()));
  cur=new Date(cur.getFullYear(),cur.getMonth(),1);
  while(cur<=end){
    meses.push({year:cur.getFullYear(),month:cur.getMonth(),key:mesKey(cur.getFullYear(),cur.getMonth())});
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }
  return meses;
}

function calcularMonto(alquiler,year,month,variables){
  if(!alquiler?.contrato)return null;
  const c=alquiler.contrato;
  const vm=variables[mesKey(year,month)]||{};
  if(c.tipo==='fijo'){
    return aplicarCalc(parseFloat(c.montoBase)||0,c.moneda||'pesos',c.ajuste,vm,c.iva);
  }
  if(c.tipo==='escalonado'){
    const inicio=new Date((alquiler.fechaInicio||'2025-01-01')+'T00:00:00');
    const mr=(year-inicio.getFullYear())*12+(month-inicio.getMonth())+1;
    const t=(c.tramos||[]).find(t=>mr>=t.mesDesde&&mr<=t.mesHasta);
    if(!t)return null;
    return aplicarCalc(parseFloat(t.montoBase)||0,t.moneda||c.moneda||'pesos',t.ajuste,vm,c.iva);
  }
  return null;
}

function aplicarCalc(base,moneda,ajuste,vm,iva){
  let monto=base;
  if(ajuste==='ipc'&&vm.ipc)monto=monto*(1+vm.ipc/100);
  const ivaFactor=iva?1.21:1;
  return{monto:monto*ivaFactor,moneda:moneda||'pesos',iva:!!iva};
}

function montoAPesos(montoObj,vm){
  if(!montoObj)return null;
  if(montoObj.moneda==='pesos')return montoObj.monto;
  if(montoObj.moneda==='dolar'&&vm?.dolar)return montoObj.monto*vm.dolar;
  if(montoObj.moneda==='nafta'&&vm?.nafta)return montoObj.monto*vm.nafta;
  return montoObj.monto;
}

// legacy compat - now uses arrays
function estadoPago(alqId,mk,pagos,esperadoPesos){
  const raw=pagos[`${alqId}_${mk}`];
  const esp=esperadoPesos||0;
  if(!raw)return{estado:'pendiente',pagado:0,esperado:esp,diferencia:-esp,lista:[]};
  const lista=Array.isArray(raw)?raw:[raw];
  const total=lista.reduce((s,p)=>s+(p.montoPesos||p.monto||0),0);
  const diff=total-esp;
  return{estado:diff>=-0.5?'pagado':(total>0?'parcial':'pendiente'),
    pagado:total,esperado:esp,diferencia:diff,lista,
    monto:lista[0]?.monto,moneda:lista[0]?.moneda,tipoPago:lista[0]?.tipoPago,detallePago:lista[0]?.detallePago,fecha:lista[0]?.fecha};
}

function waURL(tel,msg){
  const t=tel.replace(/\D/g,'');
  return`https://wa.me/${t}?text=${encodeURIComponent(msg)}`;
}

class DriveService{
  constructor(){this.token=null;this.fileId=null}
  hasClientId(){return CONFIG.CLIENT_ID&&CONFIG.CLIENT_ID.length>10}
  async signIn(){
    return new Promise((res,rej)=>{
      if(!window.google){rej(new Error('Google no cargó'));return}
      const c=window.google.accounts.oauth2.initTokenClient({
        client_id:CONFIG.CLIENT_ID,scope:CONFIG.SCOPES,
        callback:(r)=>{if(r.error){rej(new Error(r.error));return}this.token=r.access_token;res(r)}
      });
      c.requestAccessToken();
    });
  }
  signOut(){this.token=null;this.fileId=null}
  async findFile(){
    const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${CONFIG.FILE_NAME}'+and+trashed=false&fields=files(id,modifiedTime)`,{headers:{Authorization:`Bearer ${this.token}`}});
    const d=await r.json();
    if(d.files?.length>0){this.fileId=d.files[0].id;return d.files[0]}
    return null;
  }
  async load(){
    const f=await this.findFile();if(!f)return null;
    const r=await fetch(`https://www.googleapis.com/drive/v3/files/${this.fileId}?alt=media`,{headers:{Authorization:`Bearer ${this.token}`}});
    try{return JSON.parse(await r.text())}catch{return null}
  }
  async save(data){
    const body=JSON.stringify(data);
    const meta=JSON.stringify({name:CONFIG.FILE_NAME,mimeType:'application/json'});
    const b='alqboundary';
    const payload=`--${b}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${b}--`;
    const url=this.fileId
      ?`https://www.googleapis.com/upload/drive/v3/files/${this.fileId}?uploadType=multipart`
      :'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    const method=this.fileId?'PATCH':'POST';
    const r=await fetch(url,{method,headers:{Authorization:`Bearer ${this.token}`,'Content-Type':`multipart/related; boundary=${b}`},body:payload});
    if(!this.fileId){const d=await r.json();this.fileId=d.id}
  }
}
const drive=new DriveService();

// STORE
// ═══════════════════════════════════════════
function useStore(){
  const load=(k,def)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch{return def}};
  const[propiedades,setPropiedades]=useState(()=>load('pc4_props',PROPS_INICIALES));
  const[inquilinos,setInquilinos]=useState(()=>load('pc4_inqs',[]));
  const[alquileres,setAlquileres]=useState(()=>load('pc4_alqs',[]));
  const[pagos,setPagos]=useState(()=>migrarPagos(load('pc4_pagos',{})));
  const[variables,setVariables]=useState(()=>load('pc4_vars',{}));
  const[gastos,setGastos]=useState(()=>load('pc4_gastos',[]));
  // v4 new
  const[grupos,setGrupos]=useState(()=>load('pc4_grupos',GRUPOS_INICIALES));
  const[propietariosOwn,setPropietariosOwn]=useState(()=>load('pc4_owners',[]));
  const[indices,setIndices]=useState(()=>load('pc4_indices',[]));
  const[expensas,setExpensas]=useState(()=>load('pc4_expensas',[]));
  const[driveUser,setDriveUser]=useState(null);
  const[syncStatus,setSyncStatus]=useState('off');
  const[lastSync,setLastSync]=useState(null);
  const pending=useRef(null);

  const persist=(pr,inq,alq,pag,va,gas,grp,own,idx,exp)=>{
    localStorage.setItem('pc4_props',JSON.stringify(pr));
    localStorage.setItem('pc4_inqs',JSON.stringify(inq));
    localStorage.setItem('pc4_alqs',JSON.stringify(alq));
    localStorage.setItem('pc4_pagos',JSON.stringify(pag));
    localStorage.setItem('pc4_vars',JSON.stringify(va));
    localStorage.setItem('pc4_gastos',JSON.stringify(gas));
    localStorage.setItem('pc4_grupos',JSON.stringify(grp||[]));
    localStorage.setItem('pc4_owners',JSON.stringify(own||[]));
    localStorage.setItem('pc4_indices',JSON.stringify(idx||[]));
    localStorage.setItem('pc4_expensas',JSON.stringify(exp||[]));
    localStorage.setItem('pc4_ts',Date.now().toString());
  };

  const pushDrive=useCallback(async(pr,inq,alq,pag,va,gas)=>{
    if(!drive.token)return;
    setSyncStatus('loading');
    try{await drive.save({propiedades:pr,inquilinos:inq,alquileres:alq,pagos:pag,variables:va,gastos:gas,grupos:grupos,propietarios:propietariosOwn,indices:idx||indices,expensas:exp||expensas,ts:Date.now()});setSyncStatus('ok');setLastSync(new Date())}
    catch{setSyncStatus('error')}
  },[]);

  const schedule=(pr,inq,alq,pag,va,gas)=>{clearTimeout(pending.current);pending.current=setTimeout(()=>pushDrive(pr,inq,alq,pag,va,gas),2000)};

  const apply=(data)=>{
    if(!data)return;
    const pr=data.propiedades||PROPS_INICIALES,inq=data.inquilinos||[],alq=data.alquileres||[],
      pag=migrarPagos(data.pagos||{}),va=data.variables||{},gas=data.gastos||[],
      grp=data.grupos||GRUPOS_INICIALES,own=data.propietarios||[],idx=data.indices||[],exp=data.expensas||[];
    setPropiedades(pr);setInquilinos(inq);setAlquileres(alq);setPagos(pag);setVariables(va);setGastos(gas);
    setGrupos(grp);setPropietariosOwn(own);setIndices(idx);setExpensas(exp);
    persist(pr,inq,alq,pag,va,gas,grp,own,idx,exp);
  };

  const signIn=async()=>{
    setSyncStatus('loading');
    try{
      await drive.signIn();
      const ur=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:`Bearer ${drive.token}`}});
      setDriveUser(await ur.json());
      const remote=await drive.load();
      const localTs=parseInt(localStorage.getItem('pc4_ts')||'0');
      if(remote?.ts>=localTs)apply(remote);
      else await pushDrive(propiedades,inquilinos,alquileres,pagos,variables,gastos);
      setSyncStatus('ok');setLastSync(new Date());
    }catch(e){setSyncStatus('error');console.error(e)}
  };
  const signOut=()=>{drive.signOut();setDriveUser(null);setSyncStatus('off')};
  const pullDrive=async()=>{if(!drive.token)return;setSyncStatus('loading');try{apply(await drive.load());setSyncStatus('ok');setLastSync(new Date())}catch{setSyncStatus('error')}};

  const mut=(fn)=>{
    let np=propiedades,ni=inquilinos,na=alquileres,npg=pagos,nv=variables,ng=gastos;
    fn({set:(p,i,a,pg,v,g)=>{np=p;ni=i;na=a;npg=pg;nv=v;ng=g}});
    setPropiedades(np);setInquilinos(ni);setAlquileres(na);setPagos(npg);setVariables(nv);setGastos(ng);
    persist(np,ni,na,npg,nv,ng);schedule(np,ni,na,npg,nv,ng);
  };

  // PROPIEDADES
  const addProp=p=>mut(({set})=>set([...propiedades,{...p,id:uid()}],inquilinos,alquileres,pagos,variables,gastos));
  const updProp=(id,p)=>mut(({set})=>set(propiedades.map(x=>x.id===id?{...p,id}:x),inquilinos,alquileres,pagos,variables,gastos));
  const delProp=(id)=>mut(({set})=>set(propiedades.filter(x=>x.id!==id),inquilinos,alquileres,pagos,variables,gastos));

  // INQUILINOS
  const addInq=i=>mut(({set})=>set(propiedades,[...inquilinos,{...i,id:uid()}],alquileres,pagos,variables,gastos));
  const updInq=(id,i)=>mut(({set})=>set(propiedades,inquilinos.map(x=>x.id===id?{...i,id}:x),alquileres,pagos,variables,gastos));
  const delInq=(id)=>mut(({set})=>set(propiedades,inquilinos.filter(x=>x.id!==id),alquileres,pagos,variables,gastos));

  // ALQUILERES
  const addAlq=a=>mut(({set})=>set(propiedades,inquilinos,[...alquileres,{...a,id:uid(),activo:true}],pagos,variables,gastos));
  const updAlq=(id,a)=>mut(({set})=>set(propiedades,inquilinos,alquileres.map(x=>x.id===id?{...a,id}:x),pagos,variables,gastos));
  const delAlq=(id)=>{const np={...pagos};Object.keys(np).filter(k=>k.startsWith(id+'_')).forEach(k=>delete np[k]);mut(({set})=>set(propiedades,inquilinos,alquileres.filter(x=>x.id!==id),np,variables,gastos))};

  // PAGOS
  const regPago=(alqId,mk,monto,moneda,montoPesos,tipoPago,detallePago)=>{
    const k=`${alqId}_${mk}`;
    const np={...pagos,[k]:{monto:parseFloat(monto),moneda,montoPesos:parseFloat(montoPesos),tipoPago,detallePago,fecha:new Date().toISOString().slice(0,10)}};
    mut(({set})=>set(propiedades,inquilinos,alquileres,np,variables,gastos));
  };
  const delPago=(alqId,mk)=>{const k=`${alqId}_${mk}`;const np={...pagos};delete np[k];mut(({set})=>set(propiedades,inquilinos,alquileres,np,variables,gastos))};

  // VARIABLES
  const setVar=(mk,field,val)=>{
    const nv={...variables,[mk]:{...(variables[mk]||{}),[field]:parseFloat(val)||0}};
    mut(({set})=>set(propiedades,inquilinos,alquileres,pagos,nv,gastos));
  };

  // GASTOS
  const addGasto=g=>mut(({set})=>set(propiedades,inquilinos,alquileres,pagos,variables,[...gastos,{...g,id:uid()}]));
  const delGasto=(id)=>mut(({set})=>set(propiedades,inquilinos,alquileres,pagos,variables,gastos.filter(x=>x.id!==id)));

  // v4 mutations
  const addPagoV4=(alqId,mk,pago)=>{const k=`${alqId}_${mk}`;const lista=[...(pagos[k]||[]),{...pago,id:uid(),fecha:new Date().toISOString().slice(0,10)}];setPagos({...pagos,[k]:lista});persist(propiedades,inquilinos,alquileres,{...pagos,[k]:lista},variables,gastos,grupos,propietariosOwn,indices,expensas)};
  const delPagoV4=(alqId,mk,pagoId)=>{const k=`${alqId}_${mk}`;const lista=(pagos[k]||[]).filter(p=>p.id!==pagoId);const np={...pagos};if(lista.length>0)np[k]=lista;else delete np[k];setPagos(np);persist(propiedades,inquilinos,alquileres,np,variables,gastos,grupos,propietariosOwn,indices,expensas)};
  const addGrupo=g=>{const ng=[...grupos,{...g,id:uid()}];setGrupos(ng);persist(propiedades,inquilinos,alquileres,pagos,variables,gastos,ng,propietariosOwn,indices,expensas)};
  const delGrupo=(id)=>{const ng=grupos.filter(x=>x.id!==id);setGrupos(ng);persist(propiedades,inquilinos,alquileres,pagos,variables,gastos,ng,propietariosOwn,indices,expensas)};
  const addOwnerFn=o=>{const no=[...propietariosOwn,{...o,id:uid()}];setPropietariosOwn(no);persist(propiedades,inquilinos,alquileres,pagos,variables,gastos,grupos,no,indices,expensas)};
  const updOwnerFn=(id,o)=>{const no=propietariosOwn.map(x=>x.id===id?{...o,id}:x);setPropietariosOwn(no);persist(propiedades,inquilinos,alquileres,pagos,variables,gastos,grupos,no,indices,expensas)};
  const delOwnerFn=(id)=>{const no=propietariosOwn.filter(x=>x.id!==id);setPropietariosOwn(no);persist(propiedades,inquilinos,alquileres,pagos,variables,gastos,grupos,no,indices,expensas)};
  const addIndiceFn=i=>{const ni=[...indices,{...i,id:uid(),valores:{}}];setIndices(ni);persist(propiedades,inquilinos,alquileres,pagos,variables,gastos,grupos,propietariosOwn,ni,expensas)};
  const setIndiceValFn=(id,mk,val)=>{const ni=indices.map(i=>i.id===id?{...i,valores:{...(i.valores||{}),[mk]:parseFloat(val)||0}}:i);setIndices(ni);persist(propiedades,inquilinos,alquileres,pagos,variables,gastos,grupos,propietariosOwn,ni,expensas)};
  const delIndiceFn=(id)=>{const ni=indices.filter(x=>x.id!==id);setIndices(ni);persist(propiedades,inquilinos,alquileres,pagos,variables,gastos,grupos,propietariosOwn,ni,expensas)};
  const addExpensaFn=e=>{const ne=[...expensas,{...e,id:uid()}];setExpensas(ne);persist(propiedades,inquilinos,alquileres,pagos,variables,gastos,grupos,propietariosOwn,indices,ne)};
  const updExpensaPagoFn=(expId,propId,pagado)=>{const ne=expensas.map(e=>e.id===expId?{...e,pagos:{...(e.pagos||{}),[propId]:{...e.pagos?.[propId],pagado}}}:e);setExpensas(ne);persist(propiedades,inquilinos,alquileres,pagos,variables,gastos,grupos,propietariosOwn,indices,ne)};
  const delExpensaFn=(id)=>{const ne=expensas.filter(x=>x.id!==id);setExpensas(ne);persist(propiedades,inquilinos,alquileres,pagos,variables,gastos,grupos,propietariosOwn,indices,ne)};

  return{propiedades,inquilinos,alquileres,pagos,variables,gastos,grupos,propietarios:propietariosOwn,indices,expensas,
    addProp,updProp,delProp,addInq,updInq,delInq,addAlq,updAlq,delAlq,
    regPago,delPago,setVar,addGasto,delGasto,
    addPagoV4,delPagoV4,addGrupo,delGrupo,addOwner:addOwnerFn,updOwner:updOwnerFn,delOwner:delOwnerFn,
    addIndice:addIndiceFn,setIndiceVal:setIndiceValFn,delIndice:delIndiceFn,
    addExpensa:addExpensaFn,updExpensaPago:updExpensaPagoFn,delExpensa:delExpensaFn,
    driveUser,syncStatus,lastSync,signIn,signOut,pullDrive};
}

// ─── MODAL PAGO ────────────────────────────
function ModalPago({alquiler,mes,montoEsperadoObj,vm,pagoActual,onClose,onSave,onDelete,inquilinos}){
  const monedaContrato=montoEsperadoObj?.moneda||'pesos';
  const esperadoNum=montoEsperadoObj?.monto||0;
  const esperadoPesos=montoAPesos(montoEsperadoObj,vm)||0;

  const[monto,setMonto]=useState(pagoActual?String(pagoActual.monto):esperadoNum?String(Math.round(esperadoNum)):'');
  const[moneda,setMoneda]=useState(pagoActual?.moneda||monedaContrato);
  const[tipoPago,setTipoPago]=useState(pagoActual?.tipoPago||'transferencia');
  const[detalle,setDetalle]=useState(pagoActual?.detallePago||'');
  const[confirmDel,setConfirmDel]=useState(false);

  const montoPesos=useMemo(()=>{
    const n=parseFloat(monto)||0;
    if(moneda==='pesos')return n;
    if(moneda==='dolar')return n*(vm?.dolar||0);
    if(moneda==='nafta')return n*(vm?.nafta||0);
    return n;
  },[monto,moneda,vm]);

  const inq=inquilinos.find(i=>i.id===alquiler.inquilinoId);

  return h('div',{className:'modal-overlay',onClick:(e)=>{if(e.target===e.currentTarget)onClose()}},
    h('div',{className:'modal'},
      h('div',{className:'modal-handle'}),
      h('div',{className:'modal-title'},'Registrar Pago'),
      h('div',{style:{marginBottom:12}},
        h('span',{className:'chip'},mesLabel(mes.year,mes.month)),
        h('span',{className:'chip'},alquiler.nombrePropiedad||'Propiedad'),
        inq&&h('span',{className:'chip'},inq.nombre)
      ),

      h('div',{className:'form-group'},
        h('label',{className:'form-label'},'Monto pagado'),
        h('div',{className:'currency-wrap'},
          h('select',{className:'currency-select',value:moneda,onChange:(e)=>setMoneda(e.target.value)},
            h('option',{value:'pesos'},'$ Pesos'),
            h('option',{value:'dolar'},'U$D Dólar'),
            h('option',{value:'nafta'},'L Nafta')
          ),
          h('input',{className:'currency-input',type:'number',inputMode:'numeric',placeholder:'0',value:monto,onChange:(e)=>setMonto(e.target.value),autoFocus:true})
        )
      ),

      montoEsperadoObj&&h('div',{className:'alert alert-info'},
        `Esperado: ${fmtNum(esperadoNum,monedaContrato)}${monedaContrato!=='pesos'&&vm?.dolar?` ≈ ${fmtNum(esperadoPesos,'pesos')}`:''}${montoEsperadoObj.iva?' (con IVA 21%)':''}`
      ),

      moneda!=='pesos'&&montoPesos>0&&h('div',{className:'alert alert-info'},
        `Equivalente en pesos: ${fmtNum(montoPesos,'pesos')}`
      ),

      monto&&esperadoPesos&&montoPesos>=esperadoPesos&&h('div',{className:'alert alert-success'},
        `✓ Pago completo${montoPesos>esperadoPesos?' (saldo a favor: '+fmtNum(montoPesos-esperadoPesos,'pesos')+')':''}`
      ),
      monto&&esperadoPesos&&montoPesos<esperadoPesos&&montoPesos>0&&h('div',{className:'alert alert-warn'},
        `Falta: ${fmtNum(esperadoPesos-montoPesos,'pesos')}`
      ),

      h('p',{className:'section-title'},'Forma de pago'),
      h('div',{className:'pay-method-row'},
        ['transferencia','cheque','efectivo'].map(t=>
          h('button',{key:t,className:`pay-method-btn ${tipoPago===t?'active':''}`,onClick:()=>setTipoPago(t)},
            t==='transferencia'?'🏦 Transf.':t==='cheque'?'📋 Cheque':'💵 Efectivo'
          )
        )
      ),
      tipoPago==='transferencia'&&h('div',{className:'form-group'},
        h('label',{className:'form-label'},'Nombre del destinatario'),
        h('input',{className:'form-input',placeholder:'A nombre de...',value:detalle,onChange:(e)=>setDetalle(e.target.value)})
      ),
      tipoPago==='cheque'&&h('div',{className:'form-group'},
        h('label',{className:'form-label'},'N° cheque y banco'),
        h('input',{className:'form-input',placeholder:'Ej: 00012345 - Banco Nación',value:detalle,onChange:(e)=>setDetalle(e.target.value)})
      ),

      h('button',{className:'btn-primary',
        onClick:()=>{if(monto&&parseFloat(monto)>0){onSave(parseFloat(monto),moneda,montoPesos,tipoPago,detalle);onClose()}}
      },'Guardar Pago'),
      pagoActual&&!confirmDel&&h('button',{className:'btn-danger',onClick:()=>setConfirmDel(true)},'Eliminar pago'),
      confirmDel&&h('div',{style:{marginTop:8}},
        h('p',{style:{fontSize:13,color:'var(--red)',marginBottom:8,textAlign:'center'}},'¿Eliminar este pago?'),
        h('div',{style:{display:'flex',gap:8}},
          h('button',{className:'btn-secondary',style:{flex:1},onClick:()=>setConfirmDel(false)},'Cancelar'),
          h('button',{className:'btn-danger',style:{marginTop:0,flex:1},onClick:()=>{onDelete();onClose()}},'Eliminar')
        )
      ),
      h('button',{className:'btn-secondary',style:{marginTop:8},onClick:onClose},'Cancelar')
    )
  );
}

// ─── FORM ALQUILER ─────────────────────────
function FormAlquiler({initial,propiedades,inquilinos,onSave,onDelete,onClose,onNuevaProp,onNuevoInq}){
  const EMPTY={propiedadId:'',inquilinoId:'',fechaInicio:new Date().toISOString().slice(0,10),
    contrato:{tipo:'fijo',moneda:'pesos',montoBase:'',ajuste:'ninguno',iva:false,
      tramos:[{id:uid(),mesDesde:1,mesHasta:6,montoBase:'',moneda:'pesos',ajuste:'ninguno'}]}};
  const[d,setD]=useState(initial||EMPTY);
  const[confirmDel,setConfirmDel]=useState(false);

  const up=(path,val)=>setD(prev=>{const n=JSON.parse(JSON.stringify(prev));let o=n;const parts=path.split('.');for(let i=0;i<parts.length-1;i++)o=o[parts[i]];o[parts[parts.length-1]]=val;return n});
  const addTramo=()=>{const last=d.contrato.tramos[d.contrato.tramos.length-1];const desde=last?last.mesHasta+1:1;setD(p=>{const n=JSON.parse(JSON.stringify(p));n.contrato.tramos.push({id:uid(),mesDesde:desde,mesHasta:desde+5,montoBase:'',moneda:p.contrato.moneda||'pesos',ajuste:'ninguno'});return n})};
  const delTramo=(id)=>setD(p=>{const n=JSON.parse(JSON.stringify(p));n.contrato.tramos=n.contrato.tramos.filter(t=>t.id!==id);return n});
  const upTramo=(id,f,v)=>setD(p=>{const n=JSON.parse(JSON.stringify(p));const t=n.contrato.tramos.find(t=>t.id===id);if(t)t[f]=v;return n});

  const[subModal,setSubModal]=useState(null); // 'prop' | 'inq'

  const propSel=propiedades.find(p=>p.id===d.propiedadId);
  const valid=d.propiedadId&&d.inquilinoId&&d.fechaInicio&&(d.contrato.tipo==='fijo'?d.contrato.montoBase:d.contrato.tramos.every(t=>t.montoBase));

  const handleSave=()=>{
    if(!valid)return;
    const data=JSON.parse(JSON.stringify(d));
    const prop=propiedades.find(p=>p.id===data.propiedadId);
    const inq=inquilinos.find(i=>i.id===data.inquilinoId);
    data.nombrePropiedad=prop?.nombre||prop?.codigo||'';
    data.nombreInquilino=inq?.nombre||'';
    if(data.contrato.tipo==='fijo')data.contrato.montoBase=parseFloat(data.contrato.montoBase)||0;
    else data.contrato.tramos.forEach(t=>{t.montoBase=parseFloat(t.montoBase)||0});
    onSave(data);onClose();
  };

  if(subModal==='prop')return h(FormPropiedad,{initial:null,onSave:(p)=>{onNuevaProp(p);setSubModal(null)},onDelete:()=>{},onClose:()=>setSubModal(null)});
  if(subModal==='inq')return h(FormInquilino,{initial:null,onSave:(i)=>{onNuevoInq(i);setSubModal(null)},onDelete:()=>{},onClose:()=>setSubModal(null)});

  return h('div',{className:'modal-overlay',onClick:(e)=>{if(e.target===e.currentTarget)onClose()}},
    h('div',{className:'modal'},
      h('div',{className:'modal-handle'}),
      h('div',{className:'modal-title'},initial?'Editar contrato':'Nuevo contrato'),

      h('div',{className:'form-group'},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}},
          h('label',{className:'form-label',style:{marginBottom:0}},'Propiedad'),
          h('button',{onClick:()=>setSubModal('prop'),style:{background:'none',border:'none',color:'var(--blue)',fontSize:13,fontWeight:600,cursor:'pointer',padding:0}},'+ Nueva')
        ),
        h('select',{className:'form-select',value:d.propiedadId,onChange:(e)=>up('propiedadId',e.target.value)},
          h('option',{value:''},'— Seleccionar —'),
          propiedades.filter(p=>p.activo).map(p=>h('option',{key:p.id,value:p.id},`${p.codigo} · ${p.nombre}`))
        )
      ),
      h('div',{className:'form-group'},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}},
          h('label',{className:'form-label',style:{marginBottom:0}},'Inquilino'),
          h('button',{onClick:()=>setSubModal('inq'),style:{background:'none',border:'none',color:'var(--blue)',fontSize:13,fontWeight:600,cursor:'pointer',padding:0}},'+ Nuevo')
        ),
        h('select',{className:'form-select',value:d.inquilinoId,onChange:(e)=>up('inquilinoId',e.target.value)},
          h('option',{value:''},'— Seleccionar —'),
          inquilinos.map(i=>h('option',{key:i.id,value:i.id},i.nombre+(i.esSociedad?' 🏢':'')))
        )
      ),
      h('div',{className:'form-group'},
        h('label',{className:'form-label'},'Inicio del contrato'),
        h('input',{className:'form-input',type:'date',value:d.fechaInicio,onChange:(e)=>up('fechaInicio',e.target.value)})
      ),
      h('div',{className:'form-group'},
        h('label',{className:'form-label'},'Tipo de contrato'),
        h('select',{className:'form-select',value:d.contrato.tipo,onChange:(e)=>up('contrato.tipo',e.target.value)},
          h('option',{value:'fijo'},'Monto fijo'),
          h('option',{value:'escalonado'},'Escalonado por tramos')
        )
      ),

      d.contrato.tipo==='fijo'&&h('div',null,
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'Monto base'),
          h('div',{className:'currency-wrap'},
            h('select',{className:'currency-select',value:d.contrato.moneda,onChange:(e)=>up('contrato.moneda',e.target.value)},
              h('option',{value:'pesos'},'$ Pesos'),
              h('option',{value:'dolar'},'U$D Dólar'),
              h('option',{value:'nafta'},'L Nafta')
            ),
            h('input',{className:'currency-input',type:'number',inputMode:'numeric',placeholder:'0',value:d.contrato.montoBase,onChange:(e)=>up('contrato.montoBase',e.target.value)})
          )
        ),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'Tipo de ajuste'),
          h('select',{className:'form-select',value:d.contrato.ajuste,onChange:(e)=>up('contrato.ajuste',e.target.value)},
            h('option',{value:'ninguno'},'Sin ajuste'),h('option',{value:'ipc'},'IPC')
          )
        )
      ),

      d.contrato.tipo==='escalonado'&&h('div',null,
        h('p',{className:'section-title'},'Tramos'),
        d.contrato.tramos.map((t,i)=>h('div',{key:t.id,className:'tramo-card'},
          h('div',{className:'tramo-header'},
            h('span',{style:{fontWeight:600,fontSize:14}},'Tramo '+(i+1)),
            d.contrato.tramos.length>1&&h('button',{style:{background:'var(--red-bg)',color:'var(--red-text)',padding:'3px 9px',borderRadius:7,fontSize:12,fontWeight:600},onClick:()=>delTramo(t.id)},'✕')
          ),
          h('div',{className:'form-row'},
            h('div',{className:'form-group'},h('label',{className:'form-label'},'Mes desde'),h('input',{className:'form-input',type:'number',min:1,value:t.mesDesde,onChange:(e)=>upTramo(t.id,'mesDesde',parseInt(e.target.value)||1)})),
            h('div',{className:'form-group'},h('label',{className:'form-label'},'Mes hasta'),h('input',{className:'form-input',type:'number',min:1,value:t.mesHasta,onChange:(e)=>upTramo(t.id,'mesHasta',parseInt(e.target.value)||12)}))
          ),
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Monto'),
            h('div',{className:'currency-wrap'},
              h('select',{className:'currency-select',value:t.moneda||'pesos',onChange:(e)=>upTramo(t.id,'moneda',e.target.value)},
                h('option',{value:'pesos'},'$ Pesos'),h('option',{value:'dolar'},'U$D'),h('option',{value:'nafta'},'L Nafta')
              ),
              h('input',{className:'currency-input',type:'number',inputMode:'numeric',placeholder:'0',value:t.montoBase,onChange:(e)=>upTramo(t.id,'montoBase',e.target.value)})
            )
          ),
          h('div',{className:'form-group'},h('label',{className:'form-label'},'Ajuste'),
            h('select',{className:'form-select',value:t.ajuste,onChange:(e)=>upTramo(t.id,'ajuste',e.target.value)},
              h('option',{value:'ninguno'},'Sin ajuste'),h('option',{value:'ipc'},'IPC')
            )
          )
        )),
        h('button',{className:'btn-add',onClick:addTramo},'+ Agregar tramo')
      ),

      h('div',{className:'form-check'},
        h('input',{type:'checkbox',id:'iva_check',checked:d.contrato.iva,onChange:(e)=>up('contrato.iva',e.target.checked)}),
        h('label',{htmlFor:'iva_check',style:{fontSize:14}},'Aplicar IVA 21% al monto')
      ),

      h('div',{style:{height:12}}),
      h('button',{className:'btn-primary',disabled:!valid,style:{opacity:valid?1:.5},onClick:handleSave},'Guardar contrato'),
      initial&&!confirmDel&&h('button',{className:'btn-danger',onClick:()=>setConfirmDel(true)},'Eliminar contrato'),
      confirmDel&&h('div',{style:{marginTop:8}},
        h('p',{style:{fontSize:13,color:'var(--red)',marginBottom:8,textAlign:'center'}},'¿Eliminar contrato y todos sus pagos?'),
        h('div',{style:{display:'flex',gap:8}},
          h('button',{className:'btn-secondary',style:{flex:1},onClick:()=>setConfirmDel(false)},'Cancelar'),
          h('button',{className:'btn-danger',style:{marginTop:0,flex:1},onClick:()=>{onDelete();onClose()}},'Eliminar')
        )
      ),
      h('button',{className:'btn-secondary',style:{marginTop:8},onClick:onClose},'Cancelar')
    )
  );
}

// ─── HISTORIAL ─────────────────────────────
function Historial({alquiler,pagos,variables,inquilinos,onClose,onRegistrar}){
  const meses=generarMeses(alquiler.fechaInicio);
  const mesActualKey=mesKey(NOW.getFullYear(),NOW.getMonth());
  const inq=inquilinos.find(i=>i.id===alquiler.inquilinoId);
  return h('div',{className:'modal-overlay',onClick:(e)=>{if(e.target===e.currentTarget)onClose()}},
    h('div',{className:'modal'},
      h('div',{className:'modal-handle'}),
      h('div',{className:'modal-title'},alquiler.nombrePropiedad||'Historial'),
      h('p',{style:{fontSize:14,color:'var(--text2)',marginBottom:14}},inq?.nombre||alquiler.nombreInquilino),
      meses.map(m=>{
        const vm=variables[m.key]||{};
        const montoObj=calcularMonto(alquiler,m.year,m.month,variables);
        const esperadoPesos=montoAPesos(montoObj,vm);
        const p=pagos[`${alquiler.id}_${m.key}`];
        const est=estadoPago(alquiler.id,m.key,pagos,esperadoPesos);
        const esActual=m.key===mesActualKey;
        return h('div',{key:m.key,className:'month-row',style:{opacity:montoObj==null?.4:1}},
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:14,fontWeight:esActual?700:500}},mesLabel(m.year,m.month)+(esActual?' ◂':'')),
            h('div',{style:{marginTop:3}},h(Badge,{estado:est.estado})),
            p&&h('div',{style:{fontSize:12,color:'var(--text2)',marginTop:2}},
              (p.tipoPago==='transferencia'?'🏦':p.tipoPago==='cheque'?'📋':'💵')+' '+(p.tipoPago||'')+(p.detallePago?' · '+p.detallePago:'')
            )
          ),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{fontSize:14,fontWeight:700}},montoObj?fmtNum(montoObj.monto,montoObj.moneda):'—'),
            p&&h('div',{style:{fontSize:12,color:'var(--text2)'}},`Pagado: ${fmtNum(p.monto,p.moneda)}`),
            h('button',{style:{marginTop:5,background:'var(--blue-bg)',color:'var(--blue)',border:'none',padding:'5px 11px',borderRadius:7,fontSize:12,fontWeight:600,cursor:'pointer'},
              onClick:()=>onRegistrar(m,montoObj,vm,p)},p?'Editar':'Pagar')
          )
        );
      }),
      h('button',{className:'btn-secondary',style:{marginTop:14},onClick:onClose},'Cerrar')
    )
  );
}

// ─── FORM INQUILINO ────────────────────────
function FormInquilino({initial,onSave,onDelete,onClose}){
  const[d,setD]=useState(initial||{nombre:'',esSociedad:false,cuit:'',contactoPagos:'',telefonoContacto:'',telefono:'',email:'',dni:'',obs:''});
  const[confirmDel,setConfirmDel]=useState(false);
  const up=(f,v)=>setD(p=>({...p,[f]:v}));

// ─── DASHBOARD ─────────────────────────────
function TabDashboard({alquileres,pagos,variables,propiedades,inquilinos,setModal}){
  const mesActualKey=mesKey(NOW.getFullYear(),NOW.getMonth());
  const vm=variables[mesActualKey]||{};

  const rows=alquileres.filter(a=>a.activo!==false).map(a=>{
    const montoObj=calcularMonto(a,NOW.getFullYear(),NOW.getMonth(),variables);
    const esperadoPesos=montoAPesos(montoObj,vm);
    const est=estadoPago(a.id,mesActualKey,pagos,esperadoPesos);
    const inq=inquilinos.find(i=>i.id===a.inquilinoId);
    return{a,montoObj,est,inq};
  });

  const totalEsp=rows.reduce((s,r)=>s+(r.est.esperado||0),0);
  const totalCob=rows.reduce((s,r)=>s+r.est.pagado,0);
  const pagados=rows.filter(r=>r.est.estado==='pagado').length;
  const pendientes=rows.filter(r=>r.est.estado==='pendiente').length;
  const parciales=rows.filter(r=>r.est.estado==='parcial').length;

  return h('div',{className:'content'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
      h('div',null,
        h('p',{style:{fontSize:12,color:'var(--text2)'}},'Mes actual'),
        h('p',{style:{fontSize:17,fontWeight:800}},mesLabel(NOW.getFullYear(),NOW.getMonth()))
      ),
      rows.length>0&&h('div',{style:{textAlign:'right'}},
        h('p',{style:{fontSize:11,color:'var(--text2)'}},'Cobrado / Esperado'),
        h('p',{style:{fontSize:14,fontWeight:700}},fmtNum(totalCob,'pesos')+' / '+fmtNum(totalEsp,'pesos'))
      )
    ),

    rows.length>0&&h('div',{className:'stats-row'},
      h('div',{className:'stat-box'},h('div',{className:'stat-num',style:{color:'var(--green)'}},pagados),h('div',{className:'stat-label'},'Pagados')),
      h('div',{className:'stat-box'},h('div',{className:'stat-num',style:{color:'var(--yellow)'}},parciales),h('div',{className:'stat-label'},'Parciales')),
      h('div',{className:'stat-box'},h('div',{className:'stat-num',style:{color:'var(--red)'}},pendientes),h('div',{className:'stat-label'},'Pendientes'))
    ),

    rows.length===0&&h('div',{className:'empty'},
      h('div',{className:'empty-icon'},'🏠'),
      h('div',{className:'empty-msg'},'Sin contratos activos'),
      h('div',{className:'empty-sub'},'Andá a "Contratos" para agregar uno')
    ),

    rows.map(({a,montoObj,est,inq})=>{
      const pagoActual=pagos[`${a.id}_${mesActualKey}`];
      const waNombre=inq?(inq.esSociedad&&inq.contactoPagos?inq.contactoPagos:inq.nombre):'';
      const waTel=inq?(inq.esSociedad&&inq.telefonoContacto?inq.telefonoContacto:inq.telefono):'';
      const waMsg=waTel?`Hola ${waNombre}! Te recuerdo el vencimiento de ${a.nombrePropiedad||''} para ${mesLabel(NOW.getFullYear(),NOW.getMonth())}. Monto: ${montoObj?fmtNum(montoObj.monto,montoObj.moneda):'—'}. Gracias!`:null;
      return h('div',{key:a.id,className:'prop-card'},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}},
          h('div',null,
            h('div',{className:'prop-name'},a.nombrePropiedad||a.propiedadId),
            h('div',{className:'prop-sub'},inq?.nombre||a.nombreInquilino||'—')
          ),
          h(Badge,{estado:est.estado})
        ),
        h('div',{style:{marginBottom:8}},
          h('span',{className:`tag tag-${a.contrato?.tipo}`},a.contrato?.tipo==='escalonado'?'Escalonado':'Fijo'),
          montoObj&&h('span',{className:`tag tag-${montoObj.moneda}`},montoObj.moneda),
          montoObj?.iva&&h('span',{className:'tag',style:{background:'#f3e8ff',color:'#581c87'}},'IVA')
        ),
        h('div',{className:'prop-amounts'},
          h('div',{className:'amount-box'},h('div',{className:'amount-label'},'Esperado'),h('div',{className:'amount-val'},montoObj?fmtNum(montoObj.monto,montoObj.moneda):'—')),
          h('div',{className:'amount-box'},h('div',{className:'amount-label'},'Pagado (ARS)'),h('div',{className:`amount-val ${est.pagado===0?'red':est.pagado>=est.esperado?'green':'yellow'}`},fmtNum(est.pagado,'pesos'))),
          h('div',{className:'amount-box'},
            h('div',{className:'amount-label'},'Diferencia'),
            h('div',{className:`amount-val ${est.diferencia>=0?'green':'red'}`},
              est.diferencia===0?'—':(est.diferencia>0?'+':'')+fmtNum(Math.abs(est.diferencia),'pesos')
            )
          )
        ),
        pagoActual&&h('div',{className:'pago-detail'},
          h('div',{className:'pago-detail-row'},
            h('span',{style:{color:'var(--text2)'}},pagoActual.tipoPago==='transferencia'?'🏦 Transferencia':pagoActual.tipoPago==='cheque'?'📋 Cheque':'💵 Efectivo'),
            h('span',pagoActual.fecha)
          ),
          pagoActual.detallePago&&h('div',{className:'pago-detail-row'},h('span',{style:{color:'var(--text2)'}},'Detalle'),h('span',pagoActual.detallePago))
        ),
        h('div',{className:'prop-actions'},
          h('button',{className:'btn-pay',
            onClick:()=>setModal({type:'pago',alquiler:a,mes:{year:NOW.getFullYear(),month:NOW.getMonth(),key:mesActualKey},montoEsperadoObj:montoObj,vm,pagoActual})},
            est.estado==='pagado'?'✓ Registrado':'Registrar pago'
          ),
          waMsg&&h('button',{className:'btn-wa',onClick:()=>window.open(waURL(waTel,waMsg),'_blank')},'💬'),
          h('button',{className:'btn-sm',onClick:()=>setModal({type:'hist',alquiler:a})},'📋'),
          h('button',{className:'btn-sm',onClick:()=>setModal({type:'alq',data:a})},'✎')
        )
      );
    })
  );
}

// ─── REPORTE ───────────────────────────────
function TabReporte({alquileres,pagos,variables,inquilinos}){
  const[mes,setMes]=useState(mesKey(NOW.getFullYear(),NOW.getMonth()));
  const[year,month]=mes.split('-').map(Number);
  const vm=variables[mes]||{};
  const mesesDisp=[];
  for(let i=-3;i<=6;i++){const d=new Date(NOW.getFullYear(),NOW.getMonth()+i,1);mesesDisp.push({key:mesKey(d.getFullYear(),d.getMonth()),label:mesLabel(d.getFullYear(),d.getMonth())})}

  const rows=alquileres.filter(a=>a.activo!==false).map(a=>{
    const montoObj=calcularMonto(a,year,month-1,variables);
    const esp=montoAPesos(montoObj,vm);
    const est=estadoPago(a.id,mes,pagos,esp);
    const inq=inquilinos.find(i=>i.id===a.inquilinoId);
    return{a,montoObj,est,inq};
  });

  const totalEsp=rows.reduce((s,r)=>s+(r.est.esperado||0),0);
  const totalCob=rows.reduce((s,r)=>s+r.est.pagado,0);
  const pagados=rows.filter(r=>r.est.estado==='pagado').length;
  const pendientes=rows.filter(r=>r.est.estado==='pendiente').length;

  const exportar=()=>{
    const lines=[`PropControl — Reporte ${mesLabel(year,month-1)}`,'',
      'Propiedad | Inquilino | Esperado | Pagado ARS | Forma pago | Estado'];
    rows.forEach(({a,montoObj,est,inq})=>{
      const p=pagos[`${a.id}_${mes}`];
      lines.push(`${a.nombrePropiedad} | ${inq?.nombre||'—'} | ${montoObj?fmtNum(montoObj.monto,montoObj.moneda):'—'} | ${fmtNum(est.pagado,'pesos')} | ${p?.tipoPago||'—'}${p?.detallePago?' ('+p.detallePago+')':''} | ${est.estado}`);
    });
    lines.push('',`TOTAL ESPERADO (ARS): ${fmtNum(totalEsp,'pesos')}`,`TOTAL COBRADO (ARS): ${fmtNum(totalCob,'pesos')}`,`DEUDA: ${fmtNum(totalEsp-totalCob,'pesos')}`);
    const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`reporte_${mes}.txt`;a.click();
  };

  return h('div',{className:'content'},
    h('p',{className:'section-title'},'Reporte mensual'),
    h('div',{className:'form-group'},h('select',{className:'form-select',value:mes,onChange:(e)=>setMes(e.target.value)},mesesDisp.map(m=>h('option',{key:m.key,value:m.key},m.label)))),
    h('div',{className:'stats-row'},
      h('div',{className:'stat-box'},h('div',{className:'stat-num',style:{color:'var(--green)'}},pagados),h('div',{className:'stat-label'},'Pagados')),
      h('div',{className:'stat-box'},h('div',{className:'stat-num',style:{color:'var(--red)'}},pendientes),h('div',{className:'stat-label'},'Pendientes'))
    ),
    h('div',{className:'stats-row'},
      h('div',{className:'stat-box'},h('div',{className:'stat-num',style:{fontSize:15}},fmtNum(totalCob,'pesos')),h('div',{className:'stat-label'},'Total cobrado')),
      h('div',{className:'stat-box'},h('div',{className:'stat-num',style:{fontSize:15,color:'var(--red)'}},fmtNum(totalEsp-totalCob,'pesos')),h('div',{className:'stat-label'},'Deuda total'))
    ),
    rows.map(({a,montoObj,est,inq})=>{
      const p=pagos[`${a.id}_${mes}`];
      return h('div',{key:a.id,className:'card'},
        h('div',{className:'card-row'},
          h('div',null,h('div',{style:{fontWeight:700}},a.nombrePropiedad||'—'),h('div',{style:{fontSize:13,color:'var(--text2)'}},inq?.nombre||'—')),
          h(Badge,{estado:est.estado})
        ),
        h('div',{className:'card-row'},h('span',{style:{fontSize:13,color:'var(--text2)'}},'Esperado'),h('span',{style:{fontWeight:600}},montoObj?fmtNum(montoObj.monto,montoObj.moneda):'—')),
        h('div',{className:'card-row'},h('span',{style:{fontSize:13,color:'var(--text2)'}},'Pagado ARS'),h('span',{style:{fontWeight:600,color:est.pagado>=(est.esperado||0)?'var(--green)':'var(--red)'}},fmtNum(est.pagado,'pesos'))),
        p&&h('div',{className:'card-row'},
          h('span',{style:{fontSize:13,color:'var(--text2)'}},'Forma pago'),
          h('span',{style:{fontSize:13}},(p.tipoPago==='transferencia'?'🏦':p.tipoPago==='cheque'?'📋':'💵')+' '+(p.tipoPago||'')+(p.detallePago?' · '+p.detallePago:''))
        )
      );
    }),
    rows.length>0&&h('button',{className:'btn-secondary',style:{marginTop:8},onClick:exportar},'⬇ Exportar reporte (.txt)')
  );
}

    {id:'contratos',icon:'📄',label:'Contratos'},
    {id:'vars',icon:'📈',label:'Variables'},
    {id:'gastos',icon:'🔧',label:'Gastos'},
    {id:'expensas',icon:'🏦',label:'Expensas'},
    {id:'roi',icon:'💰',label:'ROI'},
    {id:'reporte',icon:'📊',label:'Reporte'},
    {id:'drive',icon:'☁️',label:'Drive'},
  ];

  const initials=driveUser?(driveUser.name||driveUser.email||'?')[0].toUpperCase():null;

  const fabActions={
    home:()=>setModal({type:'alq',data:null}),
    props:()=>setModal({type:'prop',data:null}),
    inqs:()=>setModal({type:'inq',data:null}),
    owners:()=>setModal({type:'owner',data:null}),
    contratos:()=>setModal({type:'alq',data:null}),
    gastos:()=>setModal({type:'gasto'}),
  };

  return h('div',null,
    h('div',{className:'nav'},
      h('div',{className:'nav-title'},'PropControl'),
      h('button',{className:'nav-user',onClick:()=>setTab('drive'),title:driveUser.email},initials)
    ),
    h(SyncBar,{status:syncStatus,lastSync,user:driveUser,onPull:pullDrive}),
    h('div',{className:'tabs'},
      TABS.map(t=>h('button',{key:t.id,className:`tab ${tab===t.id?'active':''}`,onClick:()=>setTab(t.id)},
        h('span',{className:'tab-icon'},t.icon),t.label
      ))
    ),

    tab==='home'&&h(TabDashboard,{alquileres,pagos,variables,propiedades,inquilinos,grupos,setModal}),
    tab==='props'&&h(TabPropiedades,{propiedades,alquileres,grupos,setModal,onAddGrupo:addGrupo,onDelGrupo:delGrupo}),
    tab==='inqs'&&h(TabInquilinos,{inquilinos,alquileres,setModal}),
    tab==='owners'&&h(TabPropietarios,{propietarios,propiedades,alquileres,pagos,setModal}),
    tab==='contratos'&&h(TabContratos,{alquileres,propiedades,inquilinos,setModal}),
    tab==='vars'&&h(TabVariablesV4,{variables,setVar,indices,addIndice,setIndiceVal,delIndice}),
    tab==='gastos'&&h(TabGastos,{gastos,propiedades,setModal,delGasto}),
    tab==='expensas'&&h(TabExpensas,{expensas,propiedades,grupos,addExpensa,updExpensaPago,delExpensa}),
    tab==='roi'&&h(TabROI,{propiedades,alquileres,pagos,gastos,grupos}),
    tab==='reporte'&&h(TabReporte,{alquileres,pagos,variables,inquilinos}),
    tab==='drive'&&h(TabDrive,{driveUser,syncStatus,lastSync,signIn,signOut,pullDrive}),

    fabActions[tab]&&h('button',{className:'fab',onClick:fabActions[tab]},'+'),

    // MODALES
    modal?.type==='pago'&&h(ModalPagoV4,{
      alquiler:modal.alquiler,mes:modal.mes,
      montoEsperadoObj:modal.montoEsperadoObj,vm:modal.vm||vm,
      pagosDelMes:modal.pagosDelMes||[],
      inquilinos,onClose:closeModal,
      onAdd:(pago)=>addPagoV4(modal.alquiler.id,modal.mes.key,pago),
      onDel:(pagoId)=>delPagoV4(modal.alquiler.id,modal.mes.key,pagoId)
    }),

    modal?.type==='alq'&&h(FormAlquiler,{
      initial:modal.data,propiedades,inquilinos,
      onSave:(data)=>modal.data?updAlq(modal.data.id,data):addAlq(data),
      onDelete:()=>modal.data&&delAlq(modal.data.id),
      onNuevaProp:(p)=>{const np={...p,id:uid(),activo:true};addProp(np);},
      onNuevoInq:(i)=>{const ni={...i,id:uid()};addInq(ni);},
      onClose:closeModal
    }),

    modal?.type==='hist'&&h(Historial,{
      alquiler:modal.alquiler,pagos,variables,inquilinos,
      onClose:closeModal,
      onRegistrar:(m,montoObj,vm,pago)=>setModal({type:'pago',alquiler:modal.alquiler,mes:m,montoEsperadoObj:montoObj,vm,pagoActual:pago})
    }),

    modal?.type==='inq'&&h(FormInquilino,{
      initial:modal.data,
      onSave:(d)=>modal.data?updInq(modal.data.id,d):addInq(d),
      onDelete:()=>modal.data&&delInq(modal.data.id),
      onClose:closeModal
    }),

    modal?.type==='prop'&&h(FormPropiedad,{
      initial:modal.data,
      onSave:(d)=>modal.data?updProp(modal.data.id,d):addProp(d),
      onDelete:()=>modal.data&&delProp(modal.data.id),
      onClose:closeModal
    }),

    modal?.type==='gasto'&&h(FormGasto,{
      propiedades,
      onSave:(g)=>addGasto(g),
      onClose:closeModal
    }),
    modal?.type==='owner'&&h(FormOwner,{
      initial:modal.data,
      onSave:(d)=>modal.data?updOwner(modal.data.id,d):addOwner(d),
      onDelete:()=>modal.data&&delOwner(modal.data.id),
      onClose:closeModal
    })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
